<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursinho Web - Contato</title>
</head>
<body>
    <header>
        <a href="index.html">Cursinho Web</a> | <a href="disciplinas.html">Disciplinas Oferecidas</a> | <a
            href="contato.html">Contato</a>
    </header>
    <main>
        <form action="">
            <div>
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required placeholder="Digite seu nome">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Digite seu email">
            </div>
            <div>
                <label for="se-disciplina">Qual disciplina você está interessado?</label>
                <select name="disciplina" id="se-disciplina">
                    <option value="">Selecione uma disciplina</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="javascript">JavaScript</option>
                </select>
            </div>
            <div>
                <fieldset>
                    <legend>Quais linguagens você conhece?</legend>
                    <input type="checkbox" id="html" name="linguagens" value="html">
                    <label for="html">HTML</label>
                    <input type="checkbox" id="css" name="linguagens" value="css">
                    <label for="css">CSS</label>
                    <input type="checkbox" id="javascript" name="linguagens" value="javascript">
                    <label for="javascript">JavaScript</label>
                </fieldset>
                <fieldset>
                    <legend>Onde você conheceu o Cursinho Web?</legend>
                    <input type="radio" id="facebook" name="onde_conheceu" value="facebook">
                    <label for="facebook">Facebook</label>
                    <input type="radio" id="instagram" name="onde_conheceu" value="instagram">
                    <label for="instagram">Instagram</label>
                    <input type="radio" id="outros" name="onde_conheceu" value="outros">
                    <label for="outros">Outros</label>
                </fieldset>
            </div>
        </form>
        <div>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </main>
</body>
</html>
